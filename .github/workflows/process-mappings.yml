name: Process Mapping Jobs

on:
  workflow_run:
    workflows: ["Daily Price Scrape"]
    types: [completed]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  map:
    runs-on: ubuntu-latest
    # Run even if scrape partially failed — process whatever was queued
    if: ${{ github.event.workflow_run.conclusion != 'cancelled' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Process mapping queue
        run: npx tsx workers/process-mapping-jobs.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY_MAPPING: ${{ secrets.ANTHROPIC_API_KEY_MAPPING }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}

      - name: Audit cross-lab coverage gaps
        run: npx tsx scripts/audit-coverage-gaps.ts || echo "::warning::audit-coverage-gaps found actionable pairs above 0.85 — check logs"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check single-lab near-duplicates
        run: npx tsx scripts/check-single-lab-tests.ts || echo "::warning::check-single-lab-tests found actionable pairs above 0.85 — check logs"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy to Vercel
        if: success() || failure()
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN not set — skipping Vercel rebuild"
            exit 0
          fi
          npm install -g vercel
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_XBfGWLeHPGB7XxJRpAHUbpyg
          VERCEL_PROJECT_ID: prj_Ke4huDuTHCP6F35IiOXi84JiR8k4
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
